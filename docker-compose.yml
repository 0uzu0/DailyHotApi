# 一键部署：直接拉取镜像，无需本地构建
# 环境变量：复制 .env.example 为 .env 并按需修改（可选；未提供时应用使用内置默认值）
# 镜像：ghcr.io/0uzu0/dailyhotapi

version: "3.8"

services:
  dailyhot-api:
    image: ghcr.io/0uzu0/dailyhotapi:latest
    container_name: dailyhot-api
    ports:
      - "6688:6688"
    volumes:
      - "./logs:/app/logs"
    env_file:
      - .env
    environment:
      - NODE_ENV=docker
    restart: always
