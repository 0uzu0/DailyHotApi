# 一键部署：直接拉取镜像，无需本地构建
# 使用前请将 .env.example 复制为 .env 并按需修改（可选）
# 镜像来源：push main / Release 后自动推送至 GitHub Container Registry (ghcr.io)

version: "3.8"

services:
  dailyhot-api:
    image: ghcr.io/imsyy/dailyhot-api:latest
    container_name: dailyhot-api
    ports:
      - "6688:6688"
    volumes:
      - "./logs:/app/logs"
    env_file:
      - .env
    environment:
      - NODE_ENV=docker
    restart: always
